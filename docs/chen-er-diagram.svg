<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="2200" height="1600" viewBox="0 0 2200 1600" role="img" aria-labelledby="title desc" xml:lang="zh-CN">
  <title id="title">车载视觉感知与人机交互系统逻辑 ER 图（9 表）</title>
  <desc id="desc">陈氏表示法逻辑 ER 图。中心为 users，认证域包含 verification_codes，视觉与控车域包含 license_plate_records、police_gesture_records、owner_gesture_records 和 vehicle_state，监控与融合域包含 system_logs、alert_events 和 scenario_conflicts。所有虚线均为应用层逻辑关系，当前数据库没有外键；scenario_conflicts 的 alert_id 逻辑关联 alert_events 的 id。</desc>
  <style>
    text { font-family: "Microsoft YaHei", "Noto Sans CJK SC", sans-serif; fill: #172033; text-anchor: middle; dominant-baseline: middle; }
    .background { fill: #f8fafc; }
    .title { font-size: 30px; font-weight: 700; }
    .subtitle { font-size: 16px; fill: #526273; }
    .domain { font-size: 21px; font-weight: 700; fill: #315c9f; }
    .entity { fill: #e8f0fe; stroke: #315c9f; stroke-width: 2.2; rx: 8; }
    .entity-name { font-size: 19px; font-weight: 700; }
    .entity-code { font-size: 14px; fill: #526273; }
    .relationship { fill: #fff1db; stroke: #a35e12; stroke-width: 2; }
    .relationship-label { font-size: 15px; font-weight: 700; fill: #713a08; }
    .edge { stroke: #526273; stroke-width: 1.8; fill: none; }
    .logical { stroke-dasharray: 8 6; }
    .cardinality { font-size: 15px; font-weight: 700; fill: #8a4200; }
    .note { font-size: 14px; fill: #526273; }
    .warning-note { font-size: 14px; fill: #8a4200; }
  </style>

  <rect width="2200" height="1600" class="background"/>
  <text x="1100" y="42" class="title">车载视觉感知与人机交互系统逻辑 ER 图（9 表）</text>
  <text x="1100" y="76" class="subtitle">矩形＝实体表　菱形＝逻辑联系　虚线＝应用层维护、未建数据库外键</text>
  <text x="1100" y="101" class="subtitle">关系基数按当前数据库约束表达：子记录可关联 0..1 个用户，一个用户可拥有 0..n 条子记录</text>

  <text x="760" y="260" class="domain">认证域</text>
  <text x="330" y="408" class="domain">视觉识别与控车域</text>
  <text x="1850" y="408" class="domain">监控与场景融合域</text>
  <text x="1100" y="548" class="domain">公共用户域</text>

  <!-- verification_codes -->
  <rect x="940" y="230" width="320" height="80" class="entity"/>
  <text x="1100" y="257" class="entity-name">验证码</text>
  <text x="1100" y="286" class="entity-code">verification_codes</text>

  <!-- users -->
  <rect x="970" y="682" width="260" height="80" class="entity"/>
  <text x="1100" y="709" class="entity-name">用户</text>
  <text x="1100" y="738" class="entity-code">users</text>

  <!-- license_plate_records -->
  <rect x="180" y="480" width="320" height="80" class="entity"/>
  <text x="340" y="507" class="entity-name">车牌识别记录</text>
  <text x="340" y="536" class="entity-code">license_plate_records</text>

  <!-- police_gesture_records -->
  <rect x="120" y="780" width="320" height="80" class="entity"/>
  <text x="280" y="807" class="entity-name">交警手势记录</text>
  <text x="280" y="836" class="entity-code">police_gesture_records</text>

  <!-- owner_gesture_records -->
  <rect x="270" y="1140" width="320" height="80" class="entity"/>
  <text x="430" y="1167" class="entity-name">车主手势记录</text>
  <text x="430" y="1196" class="entity-code">owner_gesture_records</text>

  <!-- vehicle_state -->
  <rect x="940" y="1310" width="320" height="80" class="entity"/>
  <text x="1100" y="1337" class="entity-name">车辆状态</text>
  <text x="1100" y="1366" class="entity-code">vehicle_state</text>
  <text x="1100" y="1424" class="warning-note">应用期望每用户最多一条；数据库尚无唯一约束</text>

  <!-- system_logs -->
  <rect x="1690" y="460" width="320" height="80" class="entity"/>
  <text x="1850" y="487" class="entity-name">系统日志</text>
  <text x="1850" y="516" class="entity-code">system_logs</text>

  <!-- alert_events -->
  <rect x="1690" y="780" width="320" height="80" class="entity"/>
  <text x="1850" y="807" class="entity-name">告警事件</text>
  <text x="1850" y="836" class="entity-code">alert_events</text>

  <!-- scenario_conflicts -->
  <rect x="1690" y="1150" width="320" height="80" class="entity"/>
  <text x="1850" y="1177" class="entity-name">场景冲突</text>
  <text x="1850" y="1206" class="entity-code">scenario_conflicts</text>

  <!-- users -> verification_codes -->
  <polygon points="900,455 980,490 900,525 820,490" class="relationship"/>
  <text x="900" y="490" class="relationship-label">邮箱摘要匹配</text>
  <path d="M970 700 H900 V540 L980 490" class="edge logical"/>
  <line x1="820" y1="490" x2="1030" y2="310" class="edge logical"/>
  <text x="930" y="665" class="cardinality">0..1</text>
  <text x="1010" y="352" class="cardinality">0..n</text>

  <!-- users -> license_plate_records -->
  <polygon points="690,575 770,610 690,645 610,610" class="relationship"/>
  <text x="690" y="610" class="relationship-label">车牌识别</text>
  <line x1="970" y1="705" x2="770" y2="610" class="edge logical"/>
  <line x1="610" y1="610" x2="500" y2="520" class="edge logical"/>
  <text x="920" y="680" class="cardinality">0..1</text>
  <text x="545" y="563" class="cardinality">0..n</text>

  <!-- users -> police_gesture_records -->
  <polygon points="650,725 730,760 650,795 570,760" class="relationship"/>
  <text x="650" y="760" class="relationship-label">交警手势</text>
  <line x1="970" y1="725" x2="730" y2="760" class="edge logical"/>
  <line x1="570" y1="760" x2="440" y2="820" class="edge logical"/>
  <text x="916" y="742" class="cardinality">0..1</text>
  <text x="505" y="792" class="cardinality">0..n</text>

  <!-- users -> owner_gesture_records -->
  <polygon points="740,975 820,1010 740,1045 660,1010" class="relationship"/>
  <text x="740" y="1010" class="relationship-label">车主手势</text>
  <line x1="1010" y1="762" x2="820" y2="1010" class="edge logical"/>
  <line x1="660" y1="1010" x2="590" y2="1180" class="edge logical"/>
  <text x="968" y="825" class="cardinality">0..1</text>
  <text x="624" y="1120" class="cardinality">0..n</text>

  <!-- users -> vehicle_state -->
  <polygon points="1100,1075 1180,1110 1100,1145 1020,1110" class="relationship"/>
  <text x="1100" y="1110" class="relationship-label">车辆状态</text>
  <line x1="1100" y1="762" x2="1100" y2="1075" class="edge logical"/>
  <line x1="1100" y1="1145" x2="1100" y2="1310" class="edge logical"/>
  <text x="1137" y="820" class="cardinality">0..1</text>
  <text x="1137" y="1280" class="cardinality">0..n</text>

  <!-- users -> system_logs -->
  <polygon points="1510,565 1590,600 1510,635 1430,600" class="relationship"/>
  <text x="1510" y="600" class="relationship-label">产生日志</text>
  <line x1="1230" y1="705" x2="1430" y2="600" class="edge logical"/>
  <line x1="1590" y1="600" x2="1690" y2="500" class="edge logical"/>
  <text x="1280" y="680" class="cardinality">0..1</text>
  <text x="1650" y="540" class="cardinality">0..n</text>

  <!-- users -> alert_events -->
  <polygon points="1530,725 1610,760 1530,795 1450,760" class="relationship"/>
  <text x="1530" y="760" class="relationship-label">拥有告警</text>
  <line x1="1230" y1="725" x2="1450" y2="760" class="edge logical"/>
  <line x1="1610" y1="760" x2="1690" y2="820" class="edge logical"/>
  <text x="1285" y="745" class="cardinality">0..1</text>
  <text x="1650" y="790" class="cardinality">0..n</text>

  <!-- users -> scenario_conflicts -->
  <polygon points="1500,975 1580,1010 1500,1045 1420,1010" class="relationship"/>
  <text x="1500" y="1010" class="relationship-label">拥有冲突</text>
  <line x1="1190" y1="762" x2="1420" y2="1010" class="edge logical"/>
  <line x1="1580" y1="1010" x2="1690" y2="1190" class="edge logical"/>
  <text x="1240" y="827" class="cardinality">0..1</text>
  <text x="1650" y="1130" class="cardinality">0..n</text>

  <!-- alert_events -> scenario_conflicts -->
  <polygon points="1850,965 1930,1000 1850,1035 1770,1000" class="relationship"/>
  <text x="1850" y="1000" class="relationship-label">告警联动</text>
  <line x1="1850" y1="860" x2="1850" y2="965" class="edge logical"/>
  <line x1="1850" y1="1035" x2="1850" y2="1150" class="edge logical"/>
  <text x="1890" y="900" class="cardinality">0..1</text>
  <text x="1890" y="1120" class="cardinality">0..n</text>

  <text x="1100" y="1568" class="note">说明：owner_gesture_records 更新 vehicle_state、alert_events 关联 system_logs 均为业务流程或时间窗口相关，不存在直接引用列，因此未画成实体联系。</text>
</svg>
