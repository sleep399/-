<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <title>Police gesture realtime browser test</title>
  <style>
    body { margin: 0; font-family: system-ui, sans-serif; background: #101418; color: #eef3f8; }
    main { display: grid; grid-template-columns: 1fr 360px; gap: 16px; padding: 16px; }
    canvas { width: 100%; max-height: 82vh; background: #000; }
    section { background: #182029; border: 1px solid #2a3440; padding: 16px; border-radius: 8px; }
    #gesture { font-size: 42px; font-weight: 800; margin: 12px 0; color: #7ee787; }
    #confidence, #clock, #status { color: #b7c3cf; margin: 8px 0; }
    #events { max-height: 48vh; overflow: auto; padding: 0; list-style: none; }
    #events li { display: flex; justify-content: space-between; gap: 12px; padding: 8px 0; border-bottom: 1px solid #2a3440; }
    button { padding: 10px 14px; border: 0; border-radius: 6px; background: #2f81f7; color: white; font-weight: 700; cursor: pointer; }
  </style>
</head>
<body>
  <main>
    <canvas id="canvas" width="640" height="640"></canvas>
    <section>
      <button id="start">Start realtime test</button>
      <div id="status">idle</div>
      <div id="clock">frame: -</div>
      <div id="gesture">-</div>
      <div id="confidence">confidence: -</div>
      <h3>Gesture changes</h3>
      <ul id="events"></ul>
    </section>
  </main>
  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const gestureEl = document.getElementById('gesture');
    const confidenceEl = document.getElementById('confidence');
    const statusEl = document.getElementById('status');
    const clockEl = document.getElementById('clock');
    const eventsEl = document.getElementById('events');
    const totalFrames = 80;
    const sourceStartFrame = 250;
    const frameTimeoutMs = 3000;
    let ws;
    let frameIndex = 0;
    let lastGesture = null;
    let frameTimer = null;

    function frameUrl(i) {
      return `frames/frame_${String(i).padStart(3, '0')}.jpg`;
    }

    function addEvent(label) {
      const li = document.createElement('li');
      const absoluteFrame = sourceStartFrame + frameIndex;
      li.innerHTML = `<span>frame ${absoluteFrame}</span><strong>${label}</strong>`;
      eventsEl.prepend(li);
    }

    function connectSocket() {
      ws = new WebSocket('ws://127.0.0.1:8011/ws/stream/police');
      ws.onopen = () => {
        statusEl.textContent = 'connected, playing and recognizing';
        drawAndSend();
      };
      ws.onmessage = (event) => {
        if (frameTimer) {
          clearTimeout(frameTimer);
          frameTimer = null;
        }
        const msg = JSON.parse(event.data);
        if (msg.type !== 'result') {
          statusEl.textContent = msg.message || JSON.stringify(msg);
          return;
        }
        const data = msg.data;
        gestureEl.textContent = data.gesture_cn;
        confidenceEl.textContent = `confidence: ${(data.confidence * 100).toFixed(1)}%`;
        if (data.gesture !== lastGesture) {
          addEvent(data.gesture_cn);
          lastGesture = data.gesture;
        }
        frameIndex += 1;
        setTimeout(drawAndSend, 40);
      };
      ws.onerror = () => { statusEl.textContent = 'WebSocket error'; };
    }

    function drawAndSend() {
      if (frameIndex >= totalFrames) {
        statusEl.textContent = 'done';
        return;
      }
      if (!ws || ws.readyState !== WebSocket.OPEN) {
        statusEl.textContent = 'connecting';
        connectSocket();
        return;
      }

      const img = new Image();
      img.onload = () => {
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        const absoluteFrame = sourceStartFrame + frameIndex;
        clockEl.textContent = `frame: ${absoluteFrame}`;
        const data = canvas.toDataURL('image/jpeg', 0.82).split(',')[1];
        ws.send(JSON.stringify({ type: 'frame', data }));
        frameTimer = setTimeout(() => {
          statusEl.textContent = `frame ${absoluteFrame} timeout, reconnecting`;
          addEvent('timeout');
          frameIndex += 1;
          try { ws.close(); } catch (e) {}
          ws = null;
          setTimeout(drawAndSend, 40);
        }, frameTimeoutMs);
      };
      img.src = frameUrl(frameIndex);
    }

    document.getElementById('start').onclick = () => {
      eventsEl.innerHTML = '';
      frameIndex = 0;
      lastGesture = null;
      if (frameTimer) {
        clearTimeout(frameTimer);
        frameTimer = null;
      }
      if (ws) {
        try { ws.close(); } catch (e) {}
        ws = null;
      }
      statusEl.textContent = 'connecting';
      gestureEl.textContent = '-';
      confidenceEl.textContent = 'confidence: -';
      connectSocket();
    };
  </script>
</body>
</html>
